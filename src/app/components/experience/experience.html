<section class="experience" id="experience" #section>
  <div class="experience__container">
    <h2 class="experience__title animate-on-scroll">{{ t.t('experience.title') }}</h2>
    <div class="timeline">
      @for (job of jobs; track job.role; let i = $index) {
        <div class="timeline__item animate-on-scroll" [class.timeline__item--right]="i % 2 !== 0">
          <div class="timeline__dot"></div>
          <div class="timeline__card">
            <span class="timeline__date">{{ job.date }}</span>
            <h3 class="timeline__role">{{ job.role }}</h3>
            <h4 class="timeline__company">{{ job.company }}</h4>
            <p class="timeline__description">{{ job.description }}</p>
            <div class="timeline__tags">
              @for (tag of job.tags; track tag) {
                <span class="timeline__tag">{{ tag }}</span>
              }
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
