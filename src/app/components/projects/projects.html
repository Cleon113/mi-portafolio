<section class="projects" id="projects">
  <div class="projects__container">
    <h2 class="projects__title">Proyectos</h2>
    <div class="projects__grid">
      <div class="project-card" *ngFor="let project of projects">
        <div class="project-card__header">
          <span class="project-card__icon">{{ project.icon }}</span>
          <div class="project-card__links">
            <a *ngIf="project.github" [href]="project.github" target="_blank" class="project-card__link">GitHub</a>
            <a *ngIf="project.live" [href]="project.live" target="_blank" class="project-card__link project-card__link--live">Live</a>
          </div>
        </div>
        <h3 class="project-card__name">{{ project.name }}</h3>
        <p class="project-card__description">{{ project.description }}</p>
        <div class="project-card__tags">
          <span class="project-card__tag" *ngFor="let tag of project.tags">{{ tag }}</span>
        </div>
      </div>
    </div>
  </div>
</section>
