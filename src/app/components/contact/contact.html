<section class="contact" id="contact" #section>
  <div class="contact__container">
    <h2 class="contact__title animate-on-scroll">{{ t.t('contact.title') }}</h2>
    <p class="contact__subtitle animate-on-scroll">{{ t.t('contact.subtitle') }}</p>
    <div class="contact__links">
      @for (link of links; track link.label) {
        <a [href]="link.url" target="_blank" class="contact__card animate-on-scroll">
          <span class="contact__icon">{{ link.icon }}</span>
          <span class="contact__label">{{ link.label }}</span>
          <span class="contact__value">{{ link.value }}</span>
        </a>
      }
    </div>
    <div class="contact__footer animate-on-scroll">
      <p>{{ t.t('contact.footer') }} — {{ year }}</p>
    </div>
  </div>
</section>
