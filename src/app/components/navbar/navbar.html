<nav class="nav" [class.nav--scrolled]="isScrolled">
  <div class="nav__container">
    <a (click)="scrollTo('home')" class="nav__logo">&lt;C/&gt;</a>
    <ul class="nav__links" [class.nav__links--open]="menuOpen">
      <li *ngFor="let link of links">
        <a (click)="scrollTo(link.id)">{{ link.label }}</a>
      </li>
    </ul>
    <button class="nav__burger" (click)="menuOpen = !menuOpen">
      <span [class.open]="menuOpen"></span>
    </button>
  </div>
</nav>
